name: adentweets_app
description: "AdenTweets - Arabic RTL Social Media Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.4
  google_sign_in: ^6.3.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Animation
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.2.0
  smooth_page_indicator: ^1.2.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  flutter_svg: ^2.0.16
  photo_view: ^0.15.0

  # Images
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  pull_to_refresh_flutter3: ^2.0.4
  flutter_screenutil: ^5.9.3
  url_launcher: ^6.3.1
  clipboard: ^0.1.3
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.2

  # Icons
  iconsax_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansArabic-Medium.ttf
          weight: 500