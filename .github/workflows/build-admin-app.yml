name: Build Admin App APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'admin_app/**'
      - '.github/workflows/build-admin-app.yml'

env:
  FLUTTER_VERSION: '3.27.4'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: admin_app
        run: flutter pub get

      - name: Build Release APK
        working-directory: admin_app
        run: flutter build apk --release --split-per-abi --tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: adentweets-admin-app-release
          path: admin_app/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error